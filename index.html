<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Threads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">UrbanThreads</div>

    <nav class="nav-icons">
        <div class="icon" onclick="toggleProfile()">👤</div>
        <div class="icon cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">

    <!-- IMAGE ADDED USING IMG TAG -->
    <img src="images/Hero image.jpg" class="hero-image">

    <div class="hero-content">
        <h1>Elevate Your Style with Us</h1>
        <p>Premium fashion curated for modern lifestyle</p>
        <button onclick="scrollToCategories()">Shop Now</button>
    </div>

</section>

<!-- CATEGORIES -->
<section id="categories" class="categories">

    <div class="category-card" onclick="showProducts('mens')">
        <img src="images/Mens clothing button.webp">
        <div class="category-overlay">
            <h2>Men</h2>
        </div>
    </div>

    <div class="category-card" onclick="showProducts('womens')">
        <img src="images/womens clothing button.avif">
        <div class="category-overlay">
            <h2>Women</h2>
        </div>
    </div>

    <div class="category-card" onclick="showProducts('kids')">
        <img src="images/Kids clothing images.jpeg">
        <div class="category-overlay">
            <h2>Kids</h2>
        </div>
    </div>

</section>

<!-- PRODUCTS -->
<section id="products" class="products"></section>

<!-- CART SIDEBAR -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <span onclick="toggleCart()">✖</span>
    </div>
    <div id="cartItems"></div>
    <div class="cart-footer">
        <h3 id="cartTotal">Total: ₹0</h3>
        <button class="checkout-btn" onclick="proceedToPay()">Proceed to Pay</button>
    </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="profile-modal">
    <div class="profile-content">
        <span class="close" onclick="closeProfile()">✖</span>
        <div id="profileArea"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
