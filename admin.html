<!DOCTYPE html>
<html>
<head>
    <title>UrbanThreads Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:30px;
        }

        .login-card, .dashboard{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        h2{
            margin-bottom:20px;
            text-align:center;
        }

        input, select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            padding:10px 15px;
            background:#111;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:500;
        }

        button:hover{
            background:#d4af37;
            color:black;
        }

        .dashboard{
            display:none;
        }

        .form-section{
            margin-bottom:30px;
            border-bottom:1px solid #eee;
            padding-bottom:20px;
        }

        .products-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
        }

        .product-card{
            border:1px solid #eee;
            padding:10px;
            border-radius:8px;
            text-align:center;
        }

        .product-card img{
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:6px;
        }

        .delete-btn{
            background:red;
            margin-top:10px;
        }

        .logout{
            background:red;
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="login-card" id="loginCard">
    <h2>Admin Login</h2>
    <input id="adminPhone" placeholder="Admin Phone">
    <input id="adminPassword" type="password" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
</div>

<div class="dashboard" id="adminPanel">

    <h2>Admin Dashboard</h2>

    <!-- ADD PRODUCT -->
    <div class="form-section">
        <h3>Add Product</h3>
        <input id="pName" placeholder="Product Name">
        <input id="pPrice" placeholder="Price">

        <input type="file" id="pImgFile" accept="image/*">

        <select id="pCategory">
            <option value="mens">Men</option>
            <option value="womens">Women</option>
            <option value="kids">Kids</option>
        </select>

        <button onclick="addProduct()">Add Product</button>
    </div>

    <!-- PRODUCT LIST -->
    <h3>All Products</h3>
    <div id="productList" class="products-grid"></div>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const ADMIN_PHONE = "9999999999";
const ADMIN_PASS = "admin123";

function adminLogin(){
    const phone = adminPhone.value;
    const pass = adminPassword.value;

    if(phone === ADMIN_PHONE && pass === ADMIN_PASS){
        loginCard.style.display="none";
        adminPanel.style.display="block";
        loadProducts();
    }else{
        alert("Access Denied");
    }
}

function getProducts(){
    return JSON.parse(localStorage.getItem("productsData")) || {
        mens:[],
        womens:[],
        kids:[]
    };
}

function saveProducts(data){
    localStorage.setItem("productsData", JSON.stringify(data));
}

function addProduct(){

    const name = pName.value;
    const price = pPrice.value;
    const fileInput = pImgFile;
    const category = pCategory.value;

    if(!name || !price || fileInput.files.length === 0){
        alert("Fill all fields");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        let products = getProducts();

        products[category].push({
            name:name,
            price:Number(price),
            img:e.target.result
        });

        saveProducts(products);
        loadProducts();

        pName.value="";
        pPrice.value="";
        pImgFile.value="";
    };

    reader.readAsDataURL(fileInput.files[0]);
}

function loadProducts(){

    const container = document.getElementById("productList");
    container.innerHTML = "";

    let products = getProducts();

    Object.keys(products).forEach(category => {

        products[category].forEach((product,index)=>{

            container.innerHTML += `
                <div class="product-card">
                    <img src="${product.img}">
                    <h4>${product.name}</h4>
                    <p>₹${product.price}</p>
                    <p><small>${category.toUpperCase()}</small></p>
                    <button class="delete-btn"
                        onclick="deleteProduct('${category}',${index})">
                        Delete
                    </button>
                </div>
            `;
        });

    });
}

function deleteProduct(category,index){

    let products = getProducts();

    if(confirm("Are you sure you want to delete this product?")){
        products[category].splice(index,1);
        saveProducts(products);
        loadProducts();
    }
}

function logout(){
    location.reload();
}

</script>

</body>
</html>
